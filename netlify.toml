[build]
  base = "frontend"
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  EXPO_PUBLIC_BACKEND_URL = "https://pedizone-api.fly.dev"

# SPA routing için - tüm route'ları index.html'e yönlendir
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
